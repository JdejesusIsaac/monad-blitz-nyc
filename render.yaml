services:
  - type: web
    name: allowme-monad
    runtime: node
    buildCommand: cd allowme && npm install && npm run build
    startCommand: cd allowme && npm run seed && npm start
    nodeVersion: 20.x
    envVars:
      # ── Public Monad config (safe to commit) ──────────────────────────────
      - key: NEXT_PUBLIC_MONAD_RPC
        value: https://testnet-rpc.monad.xyz
      - key: NEXT_PUBLIC_MONAD_CHAIN_ID
        value: "10143"
      - key: NEXT_PUBLIC_USDC_ADDRESS
        value: 0x534b2f3A21130d7a60830c2Df862319e593943A3
      - key: MONAD_EXPLORER_BASE
        value: https://testnet.monadvision.com
      - key: ALLOWME_VERIFY_URL
        value: https://agents.devnads.com/v1/verify
      # ── OWS (no secrets needed — setup creates wallet + token at runtime) ─
      # OWS_VAULT_PATH defaults to ~/.ows  (override here if needed)
      # OWS_TREASURY_WALLET defaults to nypl-treasury (override here if needed)
